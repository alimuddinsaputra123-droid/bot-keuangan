<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)"/>
  
  <!-- Chart Background -->
  <rect x="96" y="256" width="320" height="160" rx="16" fill="url(#chartGradient)" opacity="0.2"/>
  
  <!-- Chart Bars -->
  <rect x="128" y="320" width="48" height="96" rx="8" fill="url(#chartGradient)"/>
  <rect x="208" y="288" width="48" height="128" rx="8" fill="url(#chartGradient)"/>
  <rect x="288" y="304" width="48" height="112" rx="8" fill="url(#chartGradient)"/>
  <rect x="368" y="272" width="48" height="144" rx="8" fill="url(#chartGradient)"/>
  
  <!-- Coin/Currency Symbol -->
  <circle cx="256" cy="176" r="80" fill="url(#coinGradient)" filter="url(#shadow)"/>
  <text x="256" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="bold" text-anchor="middle" fill="#78350f">Rp</text>
  
  <!-- Accent Line -->
  <rect x="160" y="400" width="192" height="8" rx="4" fill="#10b981"/>
</svg>